<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: white; display: flex; align-items: center; justify-content: center; }
    .logo { display: inline-flex; align-items: flex-end; gap: 0; line-height: 1; }
    .name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 120px;
      color: #0E0D16;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .dot {
      width: 18px;
      height: 18px;
      background: #5C4DFF;
      border-radius: 50%;
      margin-bottom: 16px;
      margin-left: 2px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="name">datti</span>
    <div class="dot"></div>
  </div>
</body>
</html>
