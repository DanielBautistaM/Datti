<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; background: transparent; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .logo { display: flex; align-items: flex-end; gap: 0px; }
    .name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 64px;
      color: #0E0D16;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .dot {
      width: 10px;
      height: 10px;
      background: #5C4DFF;
      border-radius: 50%;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="name">datti</span>
    <div class="dot"></div>
  </div>
</body>
</html>
